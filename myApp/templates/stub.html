<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }} — Mepkin Abbey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <link rel="shortcut icon" type="image/png" href="https://www.mepkinapp.org/static/MEPKING/logo.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous" defer></script>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/18ee09c425.js" crossorigin="anonymous" defer></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0F1E1A;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    body::-webkit-scrollbar { display: none; }

    /* ── App shell ── */
    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: #1A2E28;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 34vh;
      min-height: 180px;
      max-height: 280px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://www.mepkinapp.org/static/MEPKING/oak-allee4.jpeg');
      background-size: cover;
      background-position: center 30%;
      opacity: 0.5;
    }

    .hero-scrim {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 75%;
      background: linear-gradient(to top, #1A2E28 0%, transparent 100%);
    }

    .hero-wordmark {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 18px);
      left: 0; right: 0;
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
    }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 0 22px 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Icon medallion ── */
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(172, 147, 98, 0.12);
      border: 1.5px solid rgba(172, 147, 98, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -36px auto 22px;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      color: #AC9362;
      font-size: 28px;
    }

    /* ── Headlines ── */
    .headline {
      font-size: 26px;
      font-weight: 700;
      color: #F5F0E8;
      line-height: 1.25;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .subtext {
      font-size: 14px;
      color: rgba(245, 240, 232, 0.5);
      line-height: 1.7;
      margin-bottom: 22px;
      max-width: 300px;
    }

    /* ── Coming-soon pill ── */
    .pill {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #AC9362;
      background: rgba(172, 147, 98, 0.12);
      border: 1px solid rgba(172, 147, 98, 0.3);
      padding: 5px 12px;
      border-radius: 20px;
      margin-bottom: 30px;
    }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 280px;
      padding: 14px 18px;
      border-radius: 14px;
      background: #AC9362;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.1s ease;
      letter-spacing: 0.01em;
    }

    .back-btn:hover, .back-btn:focus {
      background: #9A824F;
      color: #fff;
      text-decoration: none;
      outline: none;
    }

    .back-btn:active { transform: scale(0.98); background: #8A7244; }

    /* ── Responsive: phone frame on wide screens ── */
    @media (min-width: 431px) {
      body { align-items: center; padding: 2rem 0; }
      .app {
        min-height: auto;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
      }
      .hero { height: 240px; max-height: 240px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- ── Hero ── -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-scrim"></div>
    <div class="hero-wordmark">Mepkin Abbey</div>
  </div>

  <!-- ── Content ── -->
  <div class="content">

    <div class="icon-wrap">
      <i class="{{ icon|default:'fa-solid fa-feather' }}" aria-hidden="true"></i>
    </div>

    <h1 class="headline">{{ title }}</h1>
    <p class="subtext">{{ message }}</p>

    <span class="pill">Coming soon</span>

    <a href="/" class="back-btn">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      Back to Daily Word
    </a>

  </div><!-- /content -->

</div><!-- /app -->

</body>
</html>
