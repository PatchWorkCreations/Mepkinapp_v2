<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Mepkin Abbey{% endblock %}</title>
  <meta name="description" content="{% block description %}Explore the history and spiritual sites of Mepkin Abbey — gardens, church, columbarium, and our contemplative life.{% endblock %}">
  <meta name="author" content="Mepkin Abbey">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <link rel="shortcut icon" type="image/png" href="https://www.mepkinapp.org/static/MEPKING/logo.png">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous" defer></script>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/18ee09c425.js" crossorigin="anonymous" defer></script>

  <style>
    :root {
      --bg-outer: #0F1E1A;
      --bg-shell: #1A2E28;
      --gold: #AC9362;
      --gold-dim: rgba(172, 147, 98, 0.5);
      --cream: #F5F0E8;
      --muted: rgba(245, 240, 232, 0.5);
      --muted-2: rgba(245, 240, 232, 0.45);
      --card: rgba(255, 255, 255, 0.05);
      --line: rgba(172, 147, 98, 0.22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-outer);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: var(--cream);
    }

    body::-webkit-scrollbar { display: none; }

    /* ── App shell ── */
    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--bg-shell);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 12px;
      background: rgba(26, 46, 40, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .topbar .back {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .topbar .back:hover { background: rgba(172, 147, 98, 0.15); color: var(--gold); }

    .topbar .title {
      font-size: 16px;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: -0.01em;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar .brand-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: contain;
      background: rgba(172, 147, 98, 0.12);
      border: 1px solid var(--gold-dim);
      padding: 4px;
      flex-shrink: 0;
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      height: 38vh;
      min-height: 190px;
      max-height: 300px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 30%;
      opacity: 0.5;
    }

    .hero-scrim {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80%;
      background: linear-gradient(to top, var(--bg-shell) 0%, transparent 100%);
    }

    .hero-caption {
      position: absolute;
      bottom: 18px;
      left: 0; right: 0;
      text-align: center;
      padding: 0 22px;
    }

    .hero-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .hero-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: -0.02em;
    }

    /* ── Content ── */
    .content { flex: 1; padding: 20px 18px 110px; }

    /* ── Section heading ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 4px 14px;
    }

    .section-head::before,
    .section-head::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold-dim);
      opacity: 0.4;
    }

    .section-head span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap;
    }

    /* ── Cards ── */
    .card-list { display: flex; flex-direction: column; gap: 10px; }

    .nav-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    }

    .nav-card:hover, .nav-card:focus {
      background: rgba(172, 147, 98, 0.1);
      border-color: var(--gold-dim);
      text-decoration: none;
    }

    .nav-card:active { transform: scale(0.98); }

    .nav-card .ic {
      width: 46px;
      height: 46px;
      border-radius: 13px;
      background: rgba(172, 147, 98, 0.15);
      border: 1px solid rgba(172, 147, 98, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--gold);
      font-size: 19px;
    }

    .nav-card .tx { flex: 1; min-width: 0; }
    .nav-card .tx .t { font-size: 14px; font-weight: 600; color: var(--cream); margin-bottom: 3px; }
    .nav-card .tx .s { font-size: 12px; color: var(--muted-2); line-height: 1.45; }
    .nav-card .arrow { color: var(--gold-dim); font-size: 15px; flex-shrink: 0; }

    /* ── Image grid (tour sites) ── */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .tile {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      text-decoration: none;
      border: 1px solid var(--line);
      display: block;
    }

    .tile-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.3s ease;
    }

    .tile:hover .tile-img { transform: scale(1.06); }

    .tile-scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(15, 30, 26, 0.92) 8%, rgba(15, 30, 26, 0.1) 60%);
    }

    .tile-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      color: var(--cream);
      line-height: 1.3;
    }

    /* ── Prose ── */
    .prose { color: rgba(245, 240, 232, 0.78); font-size: 15px; line-height: 1.75; }
    .prose p { margin-bottom: 14px; }
    .prose h2 { color: var(--cream); font-size: 18px; font-weight: 700; margin: 24px 0 10px; }

    /* ── Buttons ── */
    .btn-gold {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      border-radius: 14px;
      background: var(--gold);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .btn-gold:hover, .btn-gold:focus { background: #9A824F; color: #fff; text-decoration: none; }
    .btn-gold:active { transform: scale(0.98); background: #8A7244; }

    .btn-block { width: 100%; }

    /* ── Forms ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--cream);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input::placeholder, .field textarea::placeholder { color: rgba(245, 240, 232, 0.3); }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(172, 147, 98, 0.15);
    }
    .field select option { background: var(--bg-shell); }

    .alert-success {
      background: rgba(172, 147, 98, 0.14);
      border: 1px solid var(--gold-dim);
      color: var(--cream);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Pill ── */
    .pill {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(172, 147, 98, 0.12);
      border: 1px solid var(--gold-dim);
      padding: 5px 12px;
      border-radius: 20px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(15, 30, 26, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--line);
      display: flex;
      padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
      z-index: 200;
    }

    .bottom-nav a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 4px;
      text-decoration: none;
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 500;
      transition: color 0.15s;
    }

    .bottom-nav a i { font-size: 17px; }
    .bottom-nav a.active, .bottom-nav a:hover { color: var(--gold); }

    /* ── Phone frame on wide screens ── */
    @media (min-width: 431px) {
      body { align-items: center; padding: 2rem 0; }
      .app {
        min-height: auto;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
      }
      .bottom-nav { position: sticky; }
    }

    {% block extra_css %}{% endblock %}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<div class="app">
  {% block content %}{% endblock %}

  {% block bottomnav %}
  <nav class="bottom-nav">
    <a href="/"><i class="fa-solid fa-feather"></i>Daily Word</a>
    <a href="/home/"><i class="fa-solid fa-circle-info"></i>About</a>
    <a href="/virtual-tour/"><i class="fa-solid fa-map-location-dot"></i>Tour</a>
    <a href="/pray/"><i class="fa-solid fa-hands-praying"></i>Pray</a>
  </nav>
  {% endblock %}
</div>

{% block scripts %}{% endblock %}
</body>
</html>
